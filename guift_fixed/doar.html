<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>GUIFT — Enviar Doação</title>
    <link rel="stylesheet" href="css/doar.css">
</head>
<body>
    <div class="card">
        <img src="images/logo.png" class="logo" alt="GUIFT">
        <h1>ENVIAR DOAÇÃO</h1>

        <input id="streamer-id"  placeholder="NOME DO STREAMER" autocomplete="off">
        <input id="donor-name"   type="text"   placeholder="O TEU NOME">
        <input id="amount"       type="number" placeholder="VALOR (mínimo 10 MT)" min="10" inputmode="numeric">

        <p class="label">CARTEIRA MÓVEL</p>
        <div class="wallet-buttons">
            <button class="emola" onclick="selecionarCarteira('emola', this)">eMola</button>
            <button class="mpesa" onclick="selecionarCarteira('mpesa', this)">M-Pesa</button>
        </div>

        <input id="phone"   type="tel"  placeholder="Nº TELEMÓVEL (9 dígitos)" inputmode="numeric" maxlength="9">
        <input id="message" type="text" placeholder="MENSAGEM (opcional)">

        <button id="btn-doar" onclick="enviarDoacao()">ENVIAR DOAÇÃO</button>
        <button class="btn-sec" onclick="window.location.href='index.html'">← VOLTAR</button>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase-auth.js"></script>
    <script src="js/doar.js"></script>
</body>
</html>
